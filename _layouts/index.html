---
layout: default
---

<header>
    <a href="/">Pi-TV</a>
    <hr/>
    <div id="tags">
        <span style="float:right">{{ site.time | date: "%Y-%m-%d"  }}</span>
    </div>
</header>

<article id="content">
    {{ content }}
</article>

<h2>Articles</h2>

<ul>
    {% for doc in site.docs %}
    <li><a href="{{ post.url }}">{{ doc.title }}</a></li>
    {% endfor %}
</ul>

<h2>Tags</h2>
<ul>
    <li><a href="/tags">All</a></li>
</ul>
