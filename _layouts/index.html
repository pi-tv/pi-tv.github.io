---
layout: default
---

<header>
    <a href="/">Pi-TV</a>
    <hr/>
    <div id="tags">
        <span style="float:right">{{ site.date | date: "%Y-%m-%d"  }}</span>
    </div>
</header>

<article id="content">
    {{ content }}
</article>

<h2>Articles</h2>

{% for post in site.posts %}
<ul>
    <li><a href="{{ post.url }}">{{ post.title }}</a></li>
</ul>
{% endfor %}
