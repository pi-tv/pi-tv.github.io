---
layout: default
---

<header>
    <a href="/">Pi-TV</a>
    <div id="search">
        <script async src="https://cse.google.com/cse.js?cx=58f7c0f790c204ed6"></script>
        <div class="gcse-search"></div>
    </div>
    <hr/>
    <div id="tags">
        <span style="float:right">{{ site.time | date: "%Y-%m-%d" }}</span>
    </div>
</header>

<article id="content">
    {{ content }}
</article>

<h2>Articles <small>({{ site.posts.size }})</small></h2>

<ul>
    {% assign posts = site.posts | sort_natural: 'title'  %}
    {% for post in posts %}
    <li><a href="{{ post.url }}">{{ post.title }}</a></li>
    {% endfor %}
</ul>

<h2>Tags</h2>
<ul>
    <li><a href="/tags">All</a></li>
</ul>
