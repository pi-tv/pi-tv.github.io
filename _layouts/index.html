---
layout: default
---

<header>
    <a href="/">Pi-TV</a>
    <hr/>
    <div id="tags">
        <span style="float:right">{{ site.time | date: "%Y-%m-%d"  }}</span>
    </div>
</header>

<article id="content">
    {{ content }}
</article>

<h2>Articles</h2>

{% for post in site.posts %}
<ul>
    <li><a href="{{ post.url }}">{{ post.title }}</a></li>
</ul>
{% endfor %}

<h2>Tags</h2>

{% for tag in site.tags %}
<h3>{{ tag[0] }}</h3>
<ul>
    {% for post in tag[1] %}
    <li><a href="{{ post.url }}">{{ post.title }}</a></li>
    {% endfor %}
</ul>
{% endfor %}
