---
layout: default
---

<header>
    <a href="/">Pi-TV</a>
    <hr/>
    <div id="tags">
        <span style="float:right">{{ site.time | date: "%Y-%m-%d"  }}</span>
    </div>
</header>

<article id="content">
    {{ content }}
</article>

<h2>Articles</h2>

{% for post in site.posts %}
<ul>
    <li><a href="{{ post.url }}">{{ post.title }}</a></li>
</ul>
{% endfor %}

<h2>Tags</h2>
<style>
    .index-tags {
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
    }

    .index-tag {
        flex: 1 0 auto;
    }
</style>

<div class="index-tags">
    {% for tag in site.tags %}
    <div class="index-tag">
        <h3>{{ tag[0] }}</h3>
        <ul>
            {% for post in tag[1] %}
            <li><a href="{{ post.url }}">{{ post.title }}</a></li>
            {% endfor %}
        </ul>
        {% endfor %}
    </div>
</div>
