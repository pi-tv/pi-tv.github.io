<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{ page.title }}</title>

    <style>
        html {
            font-family: Roboto, RobotoDraft, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            outline: none;
            border: none;
        }

        body {
            max-width: 60rem;
            font-size: 1rem;
            margin: 0 auto;
            padding: 1rem;
        }

        h1 {
            font-size: 2rem;
        }

        h2 {
            font-size: 1.5rem;
        }

        h3 {
            font-size: 1.25rem;
        }

        h1, h2, h3 {
            margin: 1rem 0;
        }

        p {
            margin: 0.5rem 0;
            line-height: 1.5;
        }

        li {
            margin: 0.5rem;
        }

        pre {
            display: block;
            padding: 0.5rem;
            background-color: #f5f5f5;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        header {
            height: 80px;
            background-image: url("/img/pi-tv-icon-80.png");
            background-position: right top;
            background-repeat: no-repeat;
        }

        article {

        }

        .debug header {
            border: dashed red 1px;
        }

        footer {
            margin-top: 100px;
            text-align: center;
        }

        header a {
            display: inline-block;
            cursor: pointer;
            font-size: 2rem;
            line-height: 3rem;
            text-decoration: none;
        }

        header hr {
            height: 5px;
            background: linear-gradient(90deg,
            dodgerblue 0px,
            dodgerblue 100px,
            red 100px,
            red 125px,
            yellow 125px,
            yellow 150px,
            lime 150px,
            lime 175px,
            dodgerblue 175px,
            dodgerblue 80%,
            transparent 90%
            );
        }

        ul {
            list-style-position: inside;
        }
        
        #tags {
            margin: 0.5em 0;
            line-height: 1.5;
            text-align: center;
            font-family: Consolas, "Lucida Console", monospace;
        }
    </style>

</head>
<body>

<header>
    <a href="/">Pi-TV</a>
    <hr/>
    <div id="tags">
    [ {% for tag in page.tags %}{{ tag }}{% unless forloop.last %}, {% endunless %}{% endfor %} ]
    </div>    

    </header>

<article id="content">
    {{ content }}
</article>

<footer>
    &copy; 2019 <a href="mailto:xantorohara@gmail.com"> Xantorohara </a>
</footer>

</body>
</html>
